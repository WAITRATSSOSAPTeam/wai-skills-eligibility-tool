<!DOCTYPE html>
<html lang="en">
<!-- ====================== WAI TSS/OSAP ELIGIBILITY CHECK TOOL Version 15.2 ====================== -->
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>William Angliss Institute - TRA TSS/OSAP Eligibility Checker</title>
  
    <link href="https://fonts.googleapis.com/css?family=Karla:400,700|Poppins:700" rel="stylesheet">
  
    <style>
        body {
            font-family: 'Karla', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: #f4f4f4;
            margin: 0;
            padding: 20px;
        }
        .tool-container {
            background: white;
            max-width: 900px;
            margin: 0 auto;
            border-radius: 16px;
            box-shadow: 0 10px 35px rgba(0,0,0,0.12);
            overflow: hidden;
        }
        .header {
            background: #f8f9fa;
            padding: 55px 30px 40px;
            text-align: center;
            border-bottom: 1px solid #eee;
        }
        .header img {
            max-width: 280px;
            margin-bottom: 28px;
        }
        h2 {
            font-family: 'Poppins', sans-serif;
            font-weight: 700;
            font-size: 26px;
            margin-bottom: 16px;
            color: #1f2a44;
            line-height: 1.3;
        }
        .content {
            padding: 40px 30px;
        }
        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            color: #333;
        }
        select, input[type="number"] {
            width: 100%;
            padding: 14px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            margin-top: 6px;
        }
        button {
            width: 100%;
            padding: 18px;
            background: #EA7137;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 30px;
            transition: background 0.3s;
        }
        button:hover { background: #d15f2a; }
        #result {
            margin-top: 40px;
            padding: 30px;
            border-radius: 12px;
            line-height: 1.7;
            border: 1px solid #eee;
            background: #fafafa;
        }
        .result-header {
            font-size: 22px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

<div class="tool-container">
    <div class="header">
        <img src="https://www.angliss.edu.au/siteassets/international/tra_skills_assessment/logo/wai-logo-85-years_big.png"
             alt="William Angliss Institute" loading="lazy">
       
        <h2>Am I Eligible to Apply for TRA TSS/OSAP Skills Assessment?</h2>
       
        <p style="color:#444; margin:0; font-size:15.5px; max-width: 720px; margin-left:auto; margin-right:auto;">
            Find out if William Angliss Institute can assess your culinary or bakery trade skills for Australian skilled migration
        </p>
    </div>
   
    <div class="content">
        <form id="eligibilityForm" onsubmit="event.preventDefault(); checkEligibility();">
            <div style="margin-bottom: 20px;">
                <label>My Nominated Occupation</label>
                <select id="occupation" required>
                    <option value="">Select Occupation</option>
                    <option value="Baker">Baker</option>
                    <option value="Chef">Chef or Pastry Chef</option>
                    <option value="Cook">Cook</option>
                    <option value="Pastrycook">Pastrycook</option>
                </select>
            </div>
            <div style="margin-bottom: 20px;">
                <label>TRA Assessment Program</label>
                <select id="programType" required>
                    <option value="">Select Assessment Program</option>
                    <option value="TSS">TSS (Subclass 482 visa)</option>
                    <option value="OSAP">OSAP (Other Skilled visa subclasses 186, 189, 190, 491, 494)</option>
                    <option value="Unsure">I am not sure</option>
                </select>
            </div>
            <div style="margin-bottom: 20px;">
                <label>My Passport Country</label>
                <select id="passportCountry" required>
                    <option value="">Select Passport Country</option>
                </select>
            </div>
            <div style="margin-bottom: 20px;">
                <label>My Formal Training / Qualification</label>
                <select id="formalTraining" required>
                    <option value="">Select...</option>
                    <option value="Yes">Yes - Formal qualification (Australian or Overseas)</option>
                    <option value="No">No formal training or qualification</option>
                </select>
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <div>
                    <label>Total years of relevant full-time equivalent paid experience <span style="font-size:13px;color:#666;">(max 40)</span></label>
                    <input type="number" id="yearsExperience" min="0" step="0.1" placeholder="e.g. 4" required>
                </div>
                <div>
                    <label>Total months of recent experience in last 3 years <span style="font-size:13px;color:#666;">(max 36)</span></label>
                    <input type="number" id="recentMonths" min="0" max="36" placeholder="e.g. 15" required>
                </div>
            </div>
            <button type="button" id="checkBtn" onclick="checkEligibility()">Check My Eligibility</button>
        </form>
        <div id="result" style="display:none;"></div>
    </div>
</div>

<script>
/* ====================== TRA COUNTRY LISTS ====================== */
const tssCountries = {
    "Baker": ["China", "Fiji", "Hong Kong SAR", "India", "Macau SAR", "Papua New Guinea", "Philippines", "South Africa", "Thailand", "Vietnam", "Zimbabwe"],
    "Chef": ["Bangladesh", "Brazil", "China", "Fiji", "Hong Kong SAR", "India", "Macau SAR", "Nepal", "Pakistan", "Papua New Guinea", "Philippines", "South Africa", "Thailand", "Vietnam", "Zimbabwe"],
    "Cook": ["Bangladesh", "Brazil", "China", "Fiji", "Hong Kong SAR", "India", "Macau SAR", "Nepal", "Pakistan", "Papua New Guinea", "Philippines", "South Africa", "Thailand", "Vietnam", "Zimbabwe"],
    "Pastrycook": ["Brazil", "China", "Fiji", "Hong Kong SAR", "India", "Macau SAR", "Papua New Guinea", "Philippines", "South Africa", "Thailand", "Vietnam", "Zimbabwe"]
};
const osapCountries = {
    "Baker": ["China", "Fiji", "Hong Kong SAR", "India", "Ireland", "Macau SAR", "Papua New Guinea", "Philippines", "Republic of Korea", "South Africa", "Sri Lanka", "Thailand", "United Kingdom", "Vietnam", "Zimbabwe"],
    "Chef": ["Bangladesh", "Brazil", "China", "Fiji", "Hong Kong SAR", "India", "Iran", "Ireland", "Macau SAR", "Nepal", "Pakistan", "Papua New Guinea", "Philippines", "Republic of Korea", "South Africa", "Sri Lanka", "Thailand", "United Arab Emirates", "United Kingdom", "Vietnam", "Zimbabwe"],
    "Cook": ["Bangladesh", "Brazil", "China", "Fiji", "Hong Kong SAR", "India", "Iran", "Ireland", "Macau SAR", "Nepal", "Pakistan", "Papua New Guinea", "Philippines", "Republic of Korea", "South Africa", "Sri Lanka", "Thailand", "United Arab Emirates", "United Kingdom", "Vietnam", "Zimbabwe"],
    "Pastrycook": ["Brazil", "China", "Fiji", "Hong Kong SAR", "India", "Iran", "Ireland", "Macau SAR", "Papua New Guinea", "Philippines", "Republic of Korea", "South Africa", "Sri Lanka", "Thailand", "United Arab Emirates", "United Kingdom", "Vietnam", "Zimbabwe"]
};

/* Populate Country Dropdown */
document.addEventListener('DOMContentLoaded', () => {
    const countrySet = new Set();
    Object.values(tssCountries).flat().forEach(c => countrySet.add(c));
    Object.values(osapCountries).flat().forEach(c => countrySet.add(c));
    const sorted = Array.from(countrySet).sort();
    const dropdown = document.getElementById('passportCountry');
    sorted.forEach(country => {
        const opt = document.createElement('option');
        opt.value = country;
        opt.textContent = country;
        dropdown.appendChild(opt);
    });
    const other = document.createElement('option');
    other.value = "Other";
    other.textContent = "Other - Not from a TRA nominated country / Opt-in OSAP";
    dropdown.appendChild(other);
});

function normalize(str) {
    return (str || "").trim().toLowerCase();
}

function showError(msg) {
    const div = document.getElementById('result');
    div.innerHTML = `<p style="color:#D32F2F; font-weight:600; text-align:center; font-size:16px;">${msg}</p>`;
    div.style.display = 'block';
    div.scrollIntoView({ behavior: "smooth" });
}

/* ====================== MAIN ELIGIBILITY CHECKS ====================== */
function checkEligibility() {
    const occupationSelect = document.getElementById('occupation');
    const occupationValue = occupationSelect.value;
    const occupationText = occupationSelect.options[occupationSelect.selectedIndex].text;  // This gets "Chef or Pastry Chef"

    const programType = document.getElementById('programType').value;
    const passportCountry = document.getElementById('passportCountry').value;
    const formal = document.getElementById('formalTraining').value;
    let yearsExpInput = parseFloat(document.getElementById('yearsExperience').value) || 0;
    let recentMonthsInput = parseInt(document.getElementById('recentMonths').value) || 0;

    let yearsExp = Math.min(yearsExpInput, 40);
    let recentMonths = Math.min(recentMonthsInput, 36);

    if (!occupationValue || !programType || !passportCountry || !formal) {
        return showError("Please complete all fields.");
    }

    const recentYears = recentMonths / 12;
    const unrealistic = recentYears > yearsExp + 0.1;

    const isTSS = programType === "TSS";
    const list = isTSS ? tssCountries[occupationValue] : osapCountries[occupationValue];
    const countryListed = passportCountry === "Other" || list.some(c => normalize(c) === normalize(passportCountry));
    const requiresOptIn = !countryListed;

    const hasFormal = formal === "Yes";
    const minYears = hasFormal ? 3 : 5;
    const meetsExperience = yearsExp >= minYears && recentMonths >= 12;

    let html = `<h3 style="color:${meetsExperience ? '#2e7d32' : '#D32F2F'}; text-align:center; margin-top:0;">
        ${meetsExperience ? 'You appear to be eligible' : 'You do not currently meet the minimum eligibility criteria'}
    </h3>`;

    html += `
        <p><strong>Occupation:</strong> ${occupationText}</p>
        <p><strong>Program:</strong> ${programType}</p>
        <p><strong>Passport Country:</strong> ${passportCountry}</p>
        <p><strong>Formal Training:</strong> ${hasFormal ? "Yes" : "No"}</p>
        <p><strong>Total Experience:</strong> ${yearsExp} years (minimum ${minYears})</p>
        <p><strong>Recent Experience:</strong> ${recentMonths} months in the last 3 years (minimum 12)</p>
        <hr style="margin:15px 0;">
    `;

    if (yearsExpInput > 40) html += `<p style="color:#FF9800;"><strong>Note:</strong> Total experience capped at 40 years.</p>`;
    if (recentMonthsInput > 36) html += `<p style="color:#FF9800;"><strong>Note:</strong> Months in last 3 years capped at 36.</p>`;

    if (requiresOptIn) {
        html += `<p style="color:#E65100;"><strong>Opt-In Pathway:</strong> ${occupationText} from <strong>${passportCountry}</strong> is not on the list of TRA nominated countries for ${programType}. You can still apply for OSAP via the Opt-In pathway.</p>`;
    }

    if (unrealistic) {
        html += `<div style="background:#fff3e0; padding:16px; border-left:5px solid #FF9800; border-radius:6px; margin:15px 0;">
            <strong>Please verify your experience details</strong><br><br>
            You entered <strong>${recentMonthsInput} months</strong> recent experience, but only <strong>${yearsExpInput} years</strong> total.<br>
            This is not mathematically possible.
        </div>`;
    }

    if (!meetsExperience) {
        html += `<div style="background:#fff5f5; padding:16px; border-left:5px solid #D32F2F; border-radius:6px; margin:15px 0;">
            <strong>Why you do not currently meet the criteria:</strong><br><br>
            ${yearsExp < minYears ? `• You need at least <strong>${minYears} years</strong> of total relevant paid experience.<br>` : ''}
            ${recentMonths < 12 ? `• You need at least <strong>12 months</strong> of paid employment in the last 3 years.<br>` : ''}
        </div>`;
    }

    // Email Content - Now uses occupationText
    if (meetsExperience) {
        const subject = `TRA TSS/OSAP Pre-Assessment Request - ${occupationText}`;
        const body = `Dear Skills Assessment Team,%0D%0A%0D%0A` +
            `I used the William Angliss TRA TSS/OSAP Eligibility Checker Tool.%0D%0A%0D%0A` +
            `ELIGIBILITY OUTCOME: I APPEAR TO BE ELIGIBLE%0D%0A%0D%0A` +
            `Occupation: ${occupationText}%0D%0A` +
            `Program: ${programType}%0D%0A` +
            `Passport Country: ${passportCountry}%0D%0A` +
            `Formal Training: ${hasFormal ? "Yes" : "No"}%0D%0A` +
            `Total Experience: ${yearsExp} years%0D%0A` +
            `Recent Experience: ${recentMonths} months%0D%0A%0D%0A` +
            (requiresOptIn ? `Note: Requires OSAP Opt-In pathway.%0D%0A%0D%0A` : ``) +
            `I have attached my CV.%0D%0A%0D%0AThank you,%0D%0A%0D%0ABest regards`;

        html += `<p style="text-align:center; margin-top:25px;">
                    <a href="mailto:skills.assessment@angliss.edu.au?subject=${encodeURIComponent(subject)}&body=${body}"
                       onclick="showSuccessMessage(); return true;"
                       style="background:#0066CC; color:white; padding:17px 36px; font-size:17px; font-weight:700; border-radius:8px; text-decoration:none; display:inline-block;">
                        Start Free Pre-Assessment
                    </a>
                 </p>`;
    } else {
        const subject = `TRA TSS/OSAP Eligibility Advice Request - ${occupationText}`;
        const body = `Dear Skills Assessment Team,%0D%0A%0D%0A` +
            `I used the William Angliss TRA TSS/OSAP Eligibility Checker Tool.%0D%0A%0D%0A` +
            `ELIGIBILITY OUTCOME: I DO NOT CURRENTLY MEET THE MINIMUM CRITERIA%0D%0A%0D%0A` +
            `Occupation: ${occupationText}%0D%0A` +
            `Program: ${programType}%0D%0A` +
            `Passport Country: ${passportCountry}%0D%0A` +
            `Formal Training: ${hasFormal ? "Yes" : "No"}%0D%0A` +
            `Total Experience: ${yearsExp} years%0D%0A` +
            `Recent Experience: ${recentMonths} months%0D%0A%0D%0A` +
            (requiresOptIn ? `Note: Requires OSAP Opt-In pathway.%0D%0A%0D%0A` : ``) +
            `Could you please advise if I can still apply?%0D%0A%0D%0A` +
            `I have attached my CV.%0D%0A%0D%0AThank you,%0D%0A%0D%0ABest regards`;

        html += `<p style="text-align:center; margin-top:25px;">
                    <a href="mailto:skills.assessment@angliss.edu.au?subject=${encodeURIComponent(subject)}&body=${body}"
                       onclick="showAdviceSuccessMessage(); return true;"
                       style="background:#D32F2F; color:white; padding:17px 36px; font-size:17px; font-weight:700; border-radius:8px; text-decoration:none; display:inline-block;">
                        Request Advice from Skills Assessment Team
                    </a>
                 </p>`;
    }

    const resultDiv = document.getElementById('result');
    resultDiv.innerHTML = html;
    resultDiv.style.display = 'block';
    resultDiv.scrollIntoView({ behavior: "smooth" });
}

function showSuccessMessage() {
    setTimeout(() => {
        const confirmed = confirm("Thank you!\n\nYour pre-assessment request has been opened in your email client.\n\nPlease attach your CV before sending.\n\nOur team will respond within 3 business days.\n\nClick OK to return.");
        if (confirmed) window.location.href = "https://www.angliss.edu.au/industry/tra-tss-osap-skills-assessment";
    }, 300);
}

function showAdviceSuccessMessage() {
    setTimeout(() => {
        const confirmed = confirm("Thank you!\n\nYour advice request has been opened in your email client.\n\nPlease send the email.\n\nOur team will respond within 3 business days.\n\nClick OK to return.");
        if (confirmed) window.location.href = "https://www.angliss.edu.au/industry/tra-tss-osap-skills-assessment";
    }, 300);
}
</script>
</body>
</html>
